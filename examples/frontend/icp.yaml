# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.1.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: frontend
    recipe:
      # https://github.com/dfinity/icp-cli-recipes/blob/main/recipes/asset-canister/README.md
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        build:
          # Install the dependencies
          - npm ci
          - npm run build
        dir: app/dist

networks:
  - name: local
    mode: managed
    ii: true
